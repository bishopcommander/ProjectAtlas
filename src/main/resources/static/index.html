<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectAtlas Frontend</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #08111f, #14263c 58%, #1f4a57);
            color: #f8fafc;
        }

        main {
            width: min(720px, calc(100% - 2rem));
            padding: 2rem;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.28);
        }

        code {
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>
    <main>
        <h1>ProjectAtlas now uses a React + Tailwind frontend.</h1>
        <p>The production UI is generated from the <code>frontend/</code> workspace.</p>
        <p>Run <code>npm install</code> and <code>npm run build</code> inside <code>frontend</code>, then start Spring Boot to serve the new app from this folder.</p>
    </main>
</body>
</html>
