spring:
  application:
    name: project-atlas

  datasource:
    url: jdbc:h2:file:./data/projectatlas;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      continue-on-error: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8080}
  address: 0.0.0.0

logging:
  level:
    root: INFO
    com.projectatlas: DEBUG
